// ============================================================================
// demo.proto — Protobuf 教學範例
// ============================================================================
// 這個 .proto 檔案定義了 CLIENT 和 SERVER 之間的通訊格式。
// 使用 proto3 語法，涵蓋了常見的 Protobuf 資料型別。
//
// 📌 重點觀念：
//   - Protobuf 是一種二進位序列化格式，比 JSON 更小更快
//   - .proto 檔案是「合約」，CLIENT 和 SERVER 都根據它產生程式碼
//   - 每個欄位都有一個唯一的編號（field number），用於二進位編碼
// ============================================================================

// proto3 是目前最新的語法版本
syntax = "proto3";

// package 名稱，用於避免命名衝突
// Go 會根據 go_package 產生程式碼，TypeScript 會根據 package 名稱產生
package demo;

// go_package 指定 Go 產生程式碼的 package 路徑
// 格式：module_path/package_name
option go_package = "proto-demo-server/pb";

// ============================================================================
// 列舉（Enum）
// ============================================================================
// 📌 列舉用於定義一組固定的常數值
// 注意：proto3 的第一個值必須是 0（作為預設值）
enum Priority {
  PRIORITY_UNSPECIFIED = 0;  // 預設值（proto3 強制要求第一個值為 0）
  PRIORITY_LOW = 1;          // 低優先級
  PRIORITY_MEDIUM = 2;       // 中優先級
  PRIORITY_HIGH = 3;         // 高優先級
}

// ============================================================================
// 巢狀訊息（Nested Message）
// ============================================================================
// 📌 Message 可以包含其他 Message，用於組織複雜資料結構
message Address {
  string city = 1;           // 城市
  string street = 2;         // 街道
  int32 zip_code = 3;        // 郵遞區號
}

// ============================================================================
// 請求訊息（Request）
// ============================================================================
// 📌 這個 message 展示了 Protobuf 中各種常見的資料型別
message DemoRequest {
  // --- 基本型別 ---
  string name = 1;              // 字串：UTF-8 編碼的文字
  int32 age = 2;                // 32 位元整數（有號）
  int64 score = 3;              // 64 位元整數（適合大數字）
  float height = 4;             // 32 位元浮點數
  double weight = 5;            // 64 位元浮點數（更高精度）
  bool is_active = 6;           // 布林值：true / false

  // --- 複合型別 ---
  Priority priority = 7;        // 列舉型別
  Address address = 8;          // 巢狀訊息型別

  // --- 集合型別 ---
  repeated string tags = 9;     // 📌 repeated = 陣列（可包含 0 到多個值）
  map<string, string> metadata = 10;  // 📌 map = 字典（key-value 對）
}

// ============================================================================
// 回應訊息（Response）
// ============================================================================
// 📌 SERVER 回傳的回應格式
message DemoResponse {
  bool success = 1;              // 是否成功
  string message = 2;            // 回應訊息
  string received_data_summary = 3;  // 收到的資料摘要（讓你確認資料正確傳送）
  int64 processed_at = 4;       // 處理時間（Unix timestamp）
}
