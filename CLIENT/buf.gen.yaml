# ============================================================================
# buf.gen.yaml — Buf 程式碼產生設定
# ============================================================================
# 📌 這個檔案定義要產生哪種語言的程式碼
#
# 執行 `npx buf generate ../PROTO` 會：
#   1. 指定 ../PROTO 作為輸入
#   2. 根據這裡的設定，使用 protoc-gen-es 外掛
#   3. 產生 TypeScript 程式碼到 src/gen/ 資料夾
# ============================================================================
version: v2

plugins:
  # 📌 protoc-gen-es 是 Buf 官方的 ECMAScript/TypeScript 外掛
  - local: protoc-gen-es
    out: src/gen             # 輸出資料夾
    opt:
      - target=ts            # 產生 .ts 檔案（而不是 .js）
